<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			let update = () => {};

			function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
				const websocket = new WebSocket("ws://localhost:" + inPort);
				inActionInfo = JSON.parse(inActionInfo);
				websocket.onopen = () => {
					websocket.send(JSON.stringify({
						event: inRegisterEvent,
						uuid: inPropertyInspectorUUID,
					}));
				};

				const gpuIndex = document.getElementById("gpu-index");
				gpuIndex.value = (inActionInfo.payload.settings.gpu_index ?? 0).toString();
				const interval = document.getElementById("interval");
				interval.value = (inActionInfo.payload.settings.interval ?? 2).toString();
				const intervalDisplay = document.getElementById("interval-display");
				intervalDisplay.innerText = interval.value;

				update = () => {
					intervalDisplay.innerText = interval.value;
					websocket.send(JSON.stringify({
						event: "setSettings",
						context: inActionInfo.context,
						payload: {
							gpu_index: parseInt(gpuIndex.value),
							interval: parseInt(interval.value),
						},
					}));
				};
			}
		</script>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<div class="sdpi-item">
			<div class="sdpi-item-label">GPU Index</div>
			<input id="gpu-index" type="number" min="0" max="15" oninput="update();" class="sdpi-item-value" value="0" />
		</div>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Interval (<span id="interval-display">2</span>s)</div>
			<input id="interval" oninput="update();" class="sdpi-item-value" type="range" min="1" max="30" value="2" />
		</div>
		<br />
		<p style="padding-left: 0.75rem; padding-right: 0.75rem; color: #777">
			Supports NVIDIA GPUs (via nvidia-smi) and AMD GPUs (via sysfs). Press the key to force an immediate refresh.
		</p>
	</body>
</html>
