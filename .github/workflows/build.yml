name: "Build and release"

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PLUGIN_NAME: linux-gpu-monitor

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          PACKAGE_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r ".packages[0].name")
          cp "target/${{ matrix.target }}/release/${PACKAGE_NAME}" "${PACKAGE_NAME}-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.PLUGIN_NAME }}-${{ matrix.target }}
          compression-level: 0

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Assemble plugin directory
        run: |
          PLUGIN_DIR="${PLUGIN_NAME}.sdPlugin"
          mkdir -p "${PLUGIN_DIR}"
          cp -r assets/* "${PLUGIN_DIR}/"
          for binary in binaries/${PLUGIN_NAME}-*; do
            TARGET="${binary#binaries/${PLUGIN_NAME}-}"
            mkdir -p "${PLUGIN_DIR}/${TARGET}/bin"
            cp "${binary}" "${PLUGIN_DIR}/${TARGET}/bin/${PLUGIN_NAME}"
          done
          zip -r "${PLUGIN_NAME}.zip" "${PLUGIN_DIR}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: ${{ env.PLUGIN_NAME }}.zip

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: plugin-package
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
